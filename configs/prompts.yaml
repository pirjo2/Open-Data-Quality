meta:
  name: Vetrò metadata reasoning prompts (LLM-based)
  version: "1.0-A"
  style: "three-line explicit answers"
  notes:
    - All answers MUST be in exactly three lines
    - answer: <value>
    - confidence: <0-1>
    - evidence: <short explanation mentioning field name>

symbols:

  dc:
    type: binary
    description: "Does metadata contain a creation/issued date?"
    prompt: |
      You are analysing a structured metadata JSON record from an open data portal.

      Question:
      Does the metadata contain a CREATION or ISSUED date?

      Look for fields such as:
      - issued
      - created
      - publication date

      Answer STRICTLY in three lines:
      answer: 1 if such a date exists, otherwise 0
      confidence: number between 0 and 1
      evidence: mention the exact field name

  dp:
    type: binary
    description: "Does metadata contain publication or modification date?"
    prompt: |
      You are analysing metadata JSON.

      Question:
      Does the metadata contain a PUBLICATION or MODIFICATION date?

      Look for:
      - modificationdate
      - releasedate
      - updated
      - modified

      Answer STRICTLY in three lines:
      answer: 1 if present, otherwise 0
      confidence: number between 0 and 1
      evidence: mention the field name

  sd:
    type: date
    description: "Start date of temporal coverage"
    prompt: |
      You are analysing metadata JSON.

      The metadata may contain a field like 'temporalcoverage'
      (example: "2010–2023").

      Extract the START YEAR of the coverage period.

      Return STRICTLY:
      answer: YYYY-01-01 if extractable, otherwise 0
      confidence: number between 0 and 1
      evidence: mention the coverage string

  edp:
    type: date
    description: "End date of temporal coverage"
    prompt: |
      You are analysing metadata JSON.

      Extract the END YEAR of the coverage period from fields such as:
      - temporalcoverage

      Return STRICTLY:
      answer: YYYY-12-31 if extractable, otherwise 0
      confidence: number between 0 and 1
      evidence: mention the coverage string

  id:
    type: binary
    description: "Is there a stable identifier?"
    prompt: |
      Does the metadata contain a stable dataset identifier?

      Look for:
      - datasetidentifier
      - slug
      - id

      Answer STRICTLY in three lines:
      answer: 1 if present, otherwise 0
      confidence: number between 0 and 1
      evidence: mention the identifier field

  cv:
    type: binary
    description: "Is coverage metadata present?"
    prompt: |
      Does the metadata contain coverage information such as
      temporalcoverage, geographic coverage, or population coverage?

      Answer STRICTLY in three lines:
      answer: 1 if present, otherwise 0
      confidence: number between 0 and 1
      evidence: mention the coverage field

  l:
    type: binary
    description: "Is language clear?"
    prompt: |
      Is the language of metadata clearly identifiable from fields such as title, description, or titleen?

      Answer STRICTLY in three lines:
      answer: 1 if language is clear, otherwise 0
      confidence: number between 0 and 1
      evidence: mention clues used
prompt_regimes:
  zero_shot:
    manual_metadata_extraction: |
      Extract Vetrò metadata symbols from the text below.

      Return ONLY valid JSON in this structure:
      {
        "<symbol>": <value>,
        "__evidence__": {
          "<symbol>": "<short evidence string>"
        },
        "__confidence__": {
          "<symbol>": <number between 0 and 1>
        }
      }
      
      Allowed keys:
      pb, t, d, dc, cv, l, id, s, c, dp, sd, edp, ed, cd, lu, du

      Rules:
      - Presence keys must be 0 or 1
      - Date keys must be in YYYY-MM-DD format
      - Natural-language update frequency counts as lu=1
      - du=1 only if update dates are explicitly given
      - If uncertain, omit the key
      - No explanation, no markdown

      Text:
      {text}

    currentness_anchor: |
      Return ONLY valid JSON with these keys:
      - current_column
      - current_value

      Task:
      Infer which dataset column is used to evaluate whether a row is current,
      and what value represents the current reference period.

      Rules:
      - Use only a column that actually exists in the dataset
      - current_value must match the dataset format if possible
      - If uncertain, return {{}}

      Metadata text:
      {manual_metadata_text}

      Columns:
      {columns}

      Sample rows:
      {sample_rows}

    semantic_metric_inference: |
      You are evaluating metadata and table semantics for an open dataset.

      Return ONLY valid JSON in this structure:
      {
        "<symbol>": <value>,
        "__evidence__": {
          "<symbol>": "<short evidence string>"
        },
        "__confidence__": {
          "<symbol>": <number between 0 and 1>
        }
      }

      Infer the requested Vetrò symbols from:
      - raw metadata text
      - portal metadata JSON
      - column names
      - data types
      - sample values
      - sample rows

      Rules:
      - Return ONLY valid JSON.
      - Use only the requested symbols as keys.
      - Binary/presence symbols must be 0 or 1 only.
      - Count / numeric symbols may be integers or floats if clearly inferable.
      - Date symbols (dp, sd, edp, ed, cd) must be YYYY-MM-DD only if clearly supported.
      - If evidence is insufficient, omit the symbol.
      - Do not invent facts.

      Requested symbols:
      {requested_symbols}

      Dataset context:
      {context}

  few_shot:
    manual_metadata_extraction: |
      Extract Vetrò metadata symbols from the text below.

      Return ONLY valid JSON in this structure:
      {
        "<symbol>": <value>,
        "__evidence__": {
          "<symbol>": "<short evidence string>"
        },
        "__confidence__": {
          "<symbol>": <number between 0 and 1>
        }
      }

      Example:
      Text: This dataset is updated every Monday.
      Output: {{"lu": 1}}

      Example:
      Text: Category is missing.
      Output: {{"c": 0}}

      Example:
      Text: Published on 2025-01-15.
      Output: {{"dp": "2025-01-15"}}

      Allowed keys:
      pb, t, d, dc, cv, l, id, s, c, dp, sd, edp, ed, cd, lu, du

      Rules:
      - Presence keys must be 0 or 1
      - Date keys must be in YYYY-MM-DD format
      - If uncertain, omit the key
      - No explanation, no markdown

      Text:
      {text}

    currentness_anchor: |
      Return ONLY valid JSON with these keys:
      - current_column
      - current_value

      Example:
      Metadata: The current reference period for this dataset is 2026-03. The time variable is stored in column record_period.
      Output: {{"current_column": "record_period", "current_value": "2026-03"}}

      Rules:
      - Use only a column that actually exists in the dataset
      - current_value must match the dataset format if possible
      - If uncertain, return {{}}

      Metadata text:
      {manual_metadata_text}

      Columns:
      {columns}

      Sample rows:
      {sample_rows}

    semantic_metric_inference: |
      You are evaluating metadata and table semantics for an open dataset.

      Return ONLY valid JSON in this structure:
      {
        "<symbol>": <value>,
        "__evidence__": {
          "<symbol>": "<short evidence string>"
        },
        "__confidence__": {
          "<symbol>": <number between 0 and 1>
        }
      }

      Example:
